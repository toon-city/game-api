server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/toonlive}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 400ms
    livereload:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:changeme-at-least-32-chars-long!!}
    expiration-ms: 86400000   # 24h

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
